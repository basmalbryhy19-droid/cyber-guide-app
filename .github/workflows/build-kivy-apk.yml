name: Build Python Android APK

on:
  push:
    branches:
      - main # يتم التشغيل عند الرفع على فرع main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Buildozer Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmakectags libgdbm-dev libc6-dev libsqlite3-dev tk-dev libgdbm-compat-dev liblzma-dev libffi-dev uuid-dev lzma lzma-dev
          pip3 install --user --upgrade buildozer Cython virtualenv

      - name: Build APK with Buildozer
        run: |
          if [ ! -f buildozer.spec ]; then
            buildozer init
            sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
          fi
          buildozer -v android debug

      - name: Upload Finished APK File
        uses: actions/upload-artifact@v3
        with:
          name: Python-App-APK
          path: bin/*.apk
